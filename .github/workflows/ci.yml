name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Exposure audit
        run: node scripts/checkCommittedExposure.js
      - name: Install deps
        run: |
          corepack enable
          corepack prepare npm@11.13.0 --activate
          corepack npm ci --legacy-peer-deps
      - name: Jest
        run: npm test --prefix server -- --coverage
        env:
          NODE_ENV: test

  lighthouse-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: |
          corepack enable
          corepack prepare npm@11.13.0 --activate
          corepack npm ci --legacy-peer-deps
      - name: Build for preview
        run: npm run build --prefix client
      - name: Lighthouse public a11y gate (≥90)
        working-directory: client
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          PREVIEW_PID=$!
          for i in $(seq 1 120); do
            curl -sf http://127.0.0.1:4173 >/dev/null && break
            sleep 1
          done
          LH_BASE_URL=http://127.0.0.1:4173 npm run lighthouse:ci
          kill "$PREVIEW_PID" 2>/dev/null || true

  e2e-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: |
          corepack enable
          corepack prepare npm@11.13.0 --activate
          corepack npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --prefix client
      - name: Start API
        run: npm run dev --prefix server &
        env:
          NODE_ENV: development
      - name: Wait for API
        run: |
          for i in $(seq 1 120); do
            curl -sf http://127.0.0.1:5000/api/health >/dev/null && exit 0
            sleep 1
          done
          echo "API did not become ready"
          exit 1
      - name: Public E2E smoke
        run: npm run test:e2e:public

  e2e-gate:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.check.outputs.core }}
      auth: ${{ steps.check.outputs.auth }}
    steps:
      - id: check
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          if [ -n "$E2E_PASSWORD" ]; then
            echo "core=true" >> "$GITHUB_OUTPUT"
          else
            echo "core=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$E2E_EMAIL" ] && [ -n "$E2E_PASSWORD" ]; then
            echo "auth=true" >> "$GITHUB_OUTPUT"
          else
            echo "auth=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-core-confidence:
    runs-on: ubuntu-latest
    needs: e2e-gate
    if: needs.e2e-gate.outputs.core == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: |
          corepack enable
          corepack prepare npm@11.13.0 --activate
          corepack npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --prefix client
      - name: Start API
        run: npm run dev --prefix server &
        env:
          NODE_ENV: development
      - name: Wait for API
        run: |
          for i in $(seq 1 120); do
            curl -sf http://127.0.0.1:5000/api/health >/dev/null && exit 0
            sleep 1
          done
          echo "API did not become ready"
          exit 1
      - name: Core confidence E2E
        run: npm run test:e2e:core-confidence
        env:
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

  e2e-auth:
    runs-on: ubuntu-latest
    needs: e2e-gate
    if: needs.e2e-gate.outputs.auth == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: |
          corepack enable
          corepack prepare npm@11.13.0 --activate
          corepack npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --prefix client
      - name: Start API
        run: npm run dev --prefix server &
        env:
          NODE_ENV: development
      - name: Wait for API
        run: |
          for i in $(seq 1 120); do
            curl -sf http://127.0.0.1:5000/api/health >/dev/null && exit 0
            sleep 1
          done
          echo "API did not become ready"
          exit 1
      - name: Authenticated E2E smoke
        run: npm run test:e2e
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_BASE_URL: http://127.0.0.1:4173
