name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Exposure audit
        run: node scripts/checkCommittedExposure.js
      - name: Install server deps
        run: npm ci
        working-directory: server
      - name: Jest
        run: npm test -- --coverage
        working-directory: server
        env:
          NODE_ENV: test

  client-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Exposure audit
        run: node ../scripts/checkCommittedExposure.js
      - name: Install client deps
        run: npm ci
      - name: Lint
        run: npm run lint -- --quiet
      - name: Unit tests
        run: npm test -- --coverage
      - name: Production build
        run: npm run build

  lighthouse-public:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        run: npm ci
      - name: Build for preview
        run: npm run build
      - name: Lighthouse public a11y gate (≥90)
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          npx --yes wait-on@8.0.1 http://127.0.0.1:4173 -t 120000
          LH_BASE_URL=http://127.0.0.1:4173 npm run lighthouse:ci

  e2e-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
      - name: Install deps
        run: |
          npm ci
          npm ci --prefix client
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --prefix client
      - name: Public E2E smoke
        run: npm run test:e2e:public

  e2e-core-confidence:
    runs-on: ubuntu-latest
    if: ${{ secrets.E2E_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json
      - name: Install deps
        run: |
          npm ci
          npm ci --prefix server
          npm ci --prefix client
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --prefix client
      - name: Start API
        run: npm run dev --prefix server &
        env:
          NODE_ENV: development
      - name: Wait for API
        run: npx --yes wait-on@8.0.1 http://127.0.0.1:5000/api/health -t 120000
      - name: Core confidence E2E
        run: npm run test:e2e:core-confidence
        env:
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

  e2e-auth:
    runs-on: ubuntu-latest
    if: ${{ secrets.E2E_EMAIL != '' && secrets.E2E_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: |
          npm ci --prefix server
          npm ci --prefix client
          npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --prefix client
      - name: Start API
        run: npm run dev --prefix server &
        env:
          NODE_ENV: development
      - name: Wait for API
        run: npx --yes wait-on@8.0.1 http://127.0.0.1:5000/api/health -t 120000
      - name: Authenticated E2E smoke
        run: npm run test:e2e
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_BASE_URL: http://127.0.0.1:4173
