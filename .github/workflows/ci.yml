name: CI

on:
  push:
    branches: [main, master, staging]
  pull_request:
    branches: [main, master, staging]

env:
  NPM_VERSION: "11.13.0"

jobs:
  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Exposure audit
        run: node scripts/checkCommittedExposure.js
      - name: Secrets audit
        run: npm run audit:secrets
      - name: Install deps
        run: npx --yes npm@${{ env.NPM_VERSION }} ci
      - name: Dependency audit (critical)
        run: npm audit --workspace=coreknot-server --audit-level=critical
      - name: OpenAPI version drift check
        run: node scripts/generate-openapi.mjs --check
      - name: Locked zone guard
        run: node scripts/check-locked-zones.mjs origin/main
      - name: Tenant bypass static suite
        run: node Taskmaster/server/scripts/runQaSuite3Static.js
      - name: Jest
        run: npm test --workspace=coreknot-server -- --coverage
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules --max-old-space-size=6144

  client-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Exposure audit
        run: node scripts/checkCommittedExposure.js
      - name: Secrets audit
        run: npm run audit:secrets
      - name: Install deps
        run: npx --yes npm@${{ env.NPM_VERSION }} ci
      - name: Dependency audit (critical)
        run: npm audit --workspace=CoreKnot-client --audit-level=critical
      - name: Docs generation drift check
        run: npm run docs:check
      - name: Obsidian memory drift check
        run: npm run memory:obsidian:check
      - name: Lint
        run: npm run lint --workspace=CoreKnot-client -- --quiet
      - name: Unit tests
        run: npm test --workspace=CoreKnot-client -- --coverage
      - name: Production build
        run: npm run build --workspace=CoreKnot-client

  lighthouse-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npx --yes npm@${{ env.NPM_VERSION }} ci
      - name: Build for preview
        run: npm run build --workspace=CoreKnot-client
      - name: Lighthouse public a11y gate (≥90)
        working-directory: client
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          PREVIEW_PID=$!
          for i in $(seq 1 120); do
            curl -sf http://127.0.0.1:4173 >/dev/null && break
            sleep 1
          done
          LH_BASE_URL=http://127.0.0.1:4173 LH_CI_ROUTES=/,/login npm run lighthouse:ci
          kill "$PREVIEW_PID" 2>/dev/null || true

  e2e-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npx --yes npm@${{ env.NPM_VERSION }} ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --workspace=CoreKnot-client
      - name: Public E2E smoke
        run: npm run test:e2e:public

  e2e-gate:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.check.outputs.core }}
      auth: ${{ steps.check.outputs.auth }}
    steps:
      - id: check
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          if [ -n "$E2E_PASSWORD" ]; then
            echo "core=true" >> "$GITHUB_OUTPUT"
          else
            echo "core=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$E2E_EMAIL" ] && [ -n "$E2E_PASSWORD" ]; then
            echo "auth=true" >> "$GITHUB_OUTPUT"
          else
            echo "auth=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-core-confidence:
    runs-on: ubuntu-latest
    needs: e2e-gate
    if: needs.e2e-gate.outputs.core == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npx --yes npm@${{ env.NPM_VERSION }} ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --workspace=CoreKnot-client
      - name: Start API
        run: npm run dev --workspace=coreknot-server &
        env:
          NODE_ENV: development
      - name: Wait for API
        run: |
          for i in $(seq 1 120); do
            curl -sf http://127.0.0.1:5000/api/health >/dev/null && exit 0
            sleep 1
          done
          echo "API did not become ready"
          exit 1
      - name: Core confidence E2E
        run: npm run test:e2e:core-confidence
        env:
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

  e2e-auth:
    runs-on: ubuntu-latest
    needs: e2e-gate
    if: needs.e2e-gate.outputs.auth == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npx --yes npm@${{ env.NPM_VERSION }} ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build client
        run: npm run build --workspace=CoreKnot-client
      - name: Start API
        run: npm run dev --workspace=coreknot-server &
        env:
          NODE_ENV: development
      - name: Wait for API
        run: |
          for i in $(seq 1 120); do
            curl -sf http://127.0.0.1:5000/api/health >/dev/null && exit 0
            sleep 1
          done
          echo "API did not become ready"
          exit 1
      - name: Authenticated E2E smoke
        run: npm run test:e2e
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_BASE_URL: http://127.0.0.1:4173

  production-auth-smoke:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.SKIP_PRODUCTION_AUTH_E2E != '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npx --yes npm@${{ env.NPM_VERSION }} ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Production auth smoke
        run: npm run test:e2e:production-auth
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
