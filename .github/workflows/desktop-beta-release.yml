name: Desktop Beta Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Beta version to release, e.g. 1.0.8-beta.2"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "Taskmaster/desktop/**"
      - "Taskmaster/client/**"
      - ".github/workflows/desktop-beta-release.yml"

permissions:
  contents: write

env:
  NPM_VERSION: "11.13.0"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${INPUT_VERSION:-$(node -p "require('./Taskmaster/desktop/package.json').version")}"
          TAG="v${VERSION}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "::error::Desktop beta version must match x.y.z-beta.n, got ${VERSION}"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists; skipping desktop beta release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.resolve-version.outputs.tag }}"
          git push origin "${{ needs.resolve-version.outputs.tag }}"

  publish:
    needs: [resolve-version, create-tag]
    if: needs.resolve-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: npm run desktop:publish -- --win
          - os: macos-latest
            command: npm run desktop:publish -- --mac
          - os: ubuntu-latest
            command: npm run desktop:publish -- --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Apply requested beta version
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        run: node scripts/prepare-desktop-beta-release.mjs "${{ needs.resolve-version.outputs.version }}"
      - name: Install deps
        run: npx --yes npm@${{ env.NPM_VERSION }} ci
      - name: Desktop smoke
        run: npm run desktop:smoke
      - name: Build and publish desktop beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.command }}

  no-op:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_release == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Desktop beta ${{ needs.resolve-version.outputs.version }} already released."
