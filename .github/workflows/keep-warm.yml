# Smart inactive-aware keep-warm for Render free-tier API (~15 min spin-down).
# Checker runs every 5 min; actual ping only when idle >= 7 min or cold start detected.
# Health URL: productionApiHealthUrl from .cursor/production-hosts.local.json (gitignored).
name: Keep warm (Render API)

on:
  schedule:
    # Checker interval — not ping interval (smart script decides when to ping)
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  # Set repository variable KEEP_WARM_URL to productionApiHealthUrl from .cursor/production-hosts.local.json
  KEEP_WARM_URL: ${{ vars.KEEP_WARM_URL }}
  KEEP_WARM_IDLE_MINUTES: "7"
  KEEP_WARM_STATE_PATH: .keep-warm-state.json

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache keep-warm state
        uses: actions/cache@v4
        with:
          path: .keep-warm-state.json
          key: keep-warm-state-${{ github.repository }}

      - name: Smart keep-warm
        run: node scripts/smartKeepWarm.js
