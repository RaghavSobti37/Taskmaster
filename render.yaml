services:
  - type: cron
    name: CoreKnot-daily-backup
    schedule: "31 18 * * *"
    rootDir: server
    buildCommand: npm install
    startCommand: node scripts/runDailyBackup.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKUP_ENABLED
        value: "true"
      - key: BACKUP_RETENTION_DAYS
        value: "7"
      - key: MONGODB_BACKUP_DB
        value: taskmaster_backups
  - type: cron
    name: CoreKnot-subscription-reminders
    schedule: "30 3 * * *"
    rootDir: server
    buildCommand: npm install
    startCommand: node scripts/runSubscriptionReminders.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUBSCRIPTION_REMINDERS_ENABLED
        value: "true"
