services:
  # BullMQ + cache — noeviction prevents silent job loss. Change existing instance in Dashboard if already provisioned.
  - type: keyvalue
    name: taskmaster-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # Staging-only Redis — isolates BullMQ/cache from production (T0-4)
  - type: keyvalue
    name: taskmaster-redis-staging
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # Production API — sync env vars from Dashboard if service already exists manually
  - type: web
    name: CoreKnot-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: cd .. && npm ci --omit=dev --workspace=coreknot-server
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: false
    branch: main
    envVars:
      - key: HUSKY
        value: "0"
      - key: NODE_ENV
        value: production
      - key: DD_SERVICE
        value: coreknot-api
      - key: DD_ENV
        value: production
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: MONGODB_URI_PROD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: taskmaster-redis
          type: keyvalue
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: DD_API_KEY
        sync: false
      - key: SUPABASE_SECONDARY_ENABLED
        value: "true"
      - key: SUPABASE_PG_MODE
        value: rest
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_BACKUP_BUCKET
        value: taskmaster-backups
      # URL vars — set real values from .cursor/production-hosts.local.json (derived.*)
      - key: TRACKING_BASE_URL
        value: https://YOUR-PRODUCTION-API
      - key: SERVER_URL
        value: https://YOUR-PRODUCTION-API
      - key: APP_BASE_URL
        value: https://YOUR-PRODUCTION-API
      - key: FRONTEND_URL
        value: https://YOUR-PRODUCTION-FRONTEND
      - key: CLIENT_URL
        value: https://YOUR-PRODUCTION-FRONTEND

  # Staging API — PR/preview testing; never points at production DB
  - type: web
    name: coreknot-api-staging
    runtime: node
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: cd .. && npm ci --omit=dev --workspace=coreknot-server
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: false
    branch: main
    envVars:
      - key: HUSKY
        value: "0"
      - key: NODE_ENV
        value: production
      - key: DD_SERVICE
        value: coreknot-api
      - key: DD_ENV
        value: staging
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: taskmaster-redis-staging
          type: keyvalue
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: DD_API_KEY
        sync: false
      - key: SUPABASE_SECONDARY_ENABLED
        value: "true"
      - key: SUPABASE_PG_MODE
        value: rest
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_BACKUP_BUCKET
        value: taskmaster-backups

  # NestJS staging — Postgres strangler (attendance first); preview Supabase DATABASE_URL
  - type: web
    name: coreknot-nest-staging
    runtime: node
    region: oregon
    plan: starter
    rootDir: nestjs-server
    buildCommand: cd .. && npm ci --omit=dev --workspace=@coreknot/nestjs-server && npm run build --workspace=@coreknot/nestjs-server
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: false
    branch: main
    envVars:
      - key: HUSKY
        value: "0"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5001"
      - key: DD_SERVICE
        value: coreknot-nest-api
      - key: DD_ENV
        value: staging
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: taskmaster-redis-staging
          type: keyvalue
          property: connectionString

  - type: cron
    name: CoreKnot-daily-backup
    schedule: "31 18 * * *"
    rootDir: server
    buildCommand: cd .. && npm ci --omit=dev --workspace=coreknot-server
    startCommand: node scripts/runDailyBackup.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKUP_ENABLED
        value: "true"
      - key: BACKUP_RETENTION_COUNT
        value: "2"
      - key: MONGODB_BACKUP_DB
        value: taskmaster_backups
      # Required — copy same value from CoreKnot API web service (Dashboard → Environment)
      - key: MONGODB_URI_PROD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: BACKUP_FROM_EMAIL
        value: noreply@theshakticollective.in
      - key: SUPABASE_SECONDARY_ENABLED
        value: "true"
      - key: SUPABASE_PG_MODE
        value: rest
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_BACKUP_BUCKET
        value: taskmaster-backups
      - key: BACKUP_DESTINATION
        value: supabase
  - type: cron
    name: CoreKnot-subscription-reminders
    schedule: "30 3 * * *"
    rootDir: server
    buildCommand: cd .. && npm ci --omit=dev --workspace=coreknot-server
    startCommand: node scripts/runSubscriptionReminders.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUBSCRIPTION_REMINDERS_ENABLED
        value: "true"
  - type: cron
    name: CoreKnot-crm-reach-out-digest
    schedule: "0 19 * * *"
    rootDir: server
    buildCommand: cd .. && npm ci --omit=dev --workspace=coreknot-server
    startCommand: node scripts/runCrmReachOutDigest.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CRM_REACH_OUT_DIGEST_ENABLED
        value: "true"
      - key: CRM_REACH_OUT_DIGEST_EMAIL
        sync: false
      - key: CRM_DIGEST_MONTHLY_TARGET_LAKHS
        value: "10"
      - key: RESEND_API_KEY
        sync: false
      - key: MONGODB_URI_PROD
        sync: false
  - type: cron
    name: CoreKnot-keep-warm
    schedule: "*/14 * * * *"
    rootDir: server
    buildCommand: cd .. && npm ci --omit=dev --workspace=coreknot-server
    startCommand: node scripts/keepWarm.js
    envVars:
      - key: NODE_ENV
        value: production
      # Real URL: .cursor/production-hosts.local.json → productionApiHealthUrl (derived.keepWarmUrl)
      - key: KEEP_WARM_URL
        value: YOUR-PRODUCTION-API-HEALTH
