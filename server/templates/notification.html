<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background:#0B0F19;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0B0F19;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#111827;border-radius:16px;border:1px solid #1f2937;overflow:hidden;">
          <tr>
            <td style="padding:28px 32px 16px;background:linear-gradient(135deg,#0d9488,#6366f1);">
              <p style="margin:0;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.7);">CoreKnot Notification</p>
              <h1 style="margin:8px 0 0;font-size:22px;font-weight:800;color:#ffffff;">{{title}}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px;">
              <p style="margin:0 0 8px;font-size:13px;color:#9ca3af;">Hi {{recipientName}},</p>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#e5e7eb;">{{message}}</p>
              <span style="display:inline-block;padding:4px 12px;border-radius:999px;background:#1f2937;color:#60a5fa;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">{{category}}</span>
              <p style="margin:20px 0 0;font-size:11px;color:#6b7280;">{{timestamp}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px;">
              <a href="{{ctaLink}}" style="display:inline-block;padding:12px 28px;background:#0d9488;color:#ffffff;text-decoration:none;border-radius:10px;font-size:13px;font-weight:700;">View in CoreKnot</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
